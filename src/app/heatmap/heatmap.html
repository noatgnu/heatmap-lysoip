<div class="w-full overflow-x-auto overflow-y-auto max-h-[800px] border border-gray-200 rounded bg-white">
  @if (genes().length > 0 && projects().length > 0) {
    <plotly-plot
      [data]="graphData().data"
      [layout]="graphData().layout"
      [useResizeHandler]="true"
      [style]="{position: 'relative', width: '100%', height: graphData().layout.height + 'px'}"
    ></plotly-plot>
  } @else {
    <div class="flex flex-col justify-center items-center h-64 text-gray-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
      </svg>
      <span>No data available for the current selection.</span>
    </div>
  }
</div>
